<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Repère" />
  <title>Repère</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --surface2: #222222;
      --border: #2e2e2e;
      --text: #f0ece4;
      --muted: #888;
      --accent: #e8c96a;
      --accent2: #7ecfb8;
      --danger: #e87a6a;
      --past: #444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #app {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* ── CLOCK ── */
    #clock-section {
      text-align: center;
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border);
    }

    #time {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(80px, 22vw, 130px);
      line-height: 1;
      color: var(--text);
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
    }

    #day {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(22px, 6vw, 32px);
      color: var(--accent);
      margin-top: 10px;
    }

    #date {
      font-size: clamp(14px, 4vw, 18px);
      color: var(--muted);
      margin-top: 4px;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    /* ── NEXT REMINDER BANNER ── */
    #next-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 12px;
      padding: 16px 20px;
      font-size: clamp(14px, 3.5vw, 17px);
      color: var(--text);
      display: none;
    }

    #next-banner.urgent {
      border-left-color: var(--danger);
      background: #1e1512;
    }

    #next-banner .banner-label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    #next-banner .banner-text {
      font-size: clamp(16px, 4.5vw, 22px);
      font-weight: 500;
    }

    #next-banner .banner-time {
      color: var(--accent);
      margin-top: 3px;
      font-size: clamp(13px, 3.5vw, 16px);
    }

    #next-banner.urgent .banner-time { color: var(--danger); }

    /* ── REMINDERS LIST ── */
    #reminders-section {}

    .section-label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    #reminders-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .reminder {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: opacity 0.2s;
    }

    .reminder.past {
      opacity: 0.4;
    }

    .reminder.next {
      border-color: var(--accent);
      background: #1e1c12;
    }

    .reminder.urgent {
      border-color: var(--danger);
      background: #1e1210;
    }

    .r-time {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(22px, 6vw, 30px);
      min-width: 76px;
      color: var(--muted);
    }

    .reminder.next .r-time { color: var(--accent); }
    .reminder.urgent .r-time { color: var(--danger); }

    .r-body { flex: 1; }

    .r-text {
      font-size: clamp(16px, 4.5vw, 20px);
      color: var(--text);
      line-height: 1.3;
    }

    .reminder.past .r-text { color: var(--muted); }

    .r-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .reminder.next .r-meta { color: #9a8840; }
    .reminder.urgent .r-meta { color: #9a5040; }

    .r-delete {
      background: none;
      border: none;
      color: var(--border);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s;
      line-height: 1;
    }

    .r-delete:active { color: var(--danger); }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 15px;
      font-style: italic;
    }

    /* ── ADD FORM ── */
    #add-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    #add-section .section-label { margin-bottom: 16px; }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .form-row input,
    .form-row select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      -webkit-appearance: none;
    }

    .form-row input:focus,
    .form-row select:focus {
      border-color: var(--accent);
    }

    #r-text { flex: 1; min-width: 160px; }
    #r-time { width: 120px; }
    #r-repeat { width: 120px; color: var(--text); }

    #r-repeat option { background: #1a1a1a; }

    #add-btn {
      width: 100%;
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    #add-btn:active { opacity: 0.8; }

    /* ── FOOTER ── */
    #footer {
      text-align: center;
      font-size: 12px;
      color: #333;
      font-style: italic;
      padding-top: 8px;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Clock -->
  <div id="clock-section">
    <div id="time">--:--</div>
    <div id="day">---</div>
    <div id="date">---</div>
  </div>

  <!-- Next reminder banner -->
  <div id="next-banner">
    <div class="banner-label">Prochain rappel</div>
    <div class="banner-text" id="banner-text"></div>
    <div class="banner-time" id="banner-time"></div>
  </div>

  <!-- Reminders list -->
  <div id="reminders-section">
    <div class="section-label">Rappels du jour</div>
    <div id="reminders-list"></div>
  </div>

  <!-- Add form -->
  <div id="add-section">
    <div class="section-label">Ajouter un rappel</div>
    <div class="form-row">
      <input type="text" id="r-text" placeholder="Médicaments, repas…" />
      <input type="time" id="r-time" />
    </div>
    <div class="form-row">
      <select id="r-repeat">
        <option value="daily">Tous les jours</option>
        <option value="once">Une seule fois</option>
      </select>
    </div>
    <button id="add-btn" onclick="addReminder()">+ Ajouter</button>
  </div>

  <div id="footer">Repère · fait avec ❤️</div>

</div>

<script>
  const DAYS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const MONTHS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

  let reminders = [];

  function load() {
    try {
      reminders = JSON.parse(localStorage.getItem('repere_reminders') || '[]');
    } catch(e) { reminders = []; }
    if (!reminders.length) {
      reminders = [
        { id: 1, time: '08:00', text: 'Médicaments du matin', repeat: 'daily' },
        { id: 2, time: '12:30', text: 'Déjeuner', repeat: 'daily' },
        { id: 3, time: '20:00', text: 'Médicaments du soir', repeat: 'daily' },
      ];
      save();
    }
  }

  function save() {
    localStorage.setItem('repere_reminders', JSON.stringify(reminders));
  }

  function toMins(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  function render() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('time').textContent = h + ':' + m;
    document.getElementById('day').textContent = DAYS[now.getDay()];
    document.getElementById('date').textContent =
      now.getDate() + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();

    const curMins = now.getHours() * 60 + now.getMinutes();
    const sorted = [...reminders].sort((a, b) => toMins(a.time) - toMins(b.time));

    // Find next upcoming
    let next = null;
    for (const r of sorted) {
      if (toMins(r.time) > curMins) { next = r; break; }
    }

    // Render banner
    const banner = document.getElementById('next-banner');
    if (next) {
      const diff = toMins(next.time) - curMins;
      const hh = Math.floor(diff / 60);
      const mm = diff % 60;
      const countdown = hh ? `dans ${hh}h ${mm}min` : `dans ${mm} min`;
      document.getElementById('banner-text').textContent = next.text;
      document.getElementById('banner-time').textContent = next.time + ' · ' + countdown;
      banner.style.display = 'block';
      banner.className = diff <= 30 ? 'urgent' : '';
    } else {
      banner.style.display = 'none';
    }

    // Render list
    const list = document.getElementById('reminders-list');
    if (!sorted.length) {
      list.innerHTML = '<div class="empty-state">Aucun rappel. Ajoutez-en un ci-dessous.</div>';
      return;
    }

    list.innerHTML = sorted.map(r => {
      const rMins = toMins(r.time);
      const diff = rMins - curMins;
      let cls = '';
      let meta = r.repeat === 'daily' ? 'Quotidien' : 'Unique';

      if (diff < 0) {
        cls = 'past';
        meta += ' · passé';
      } else if (next && r.id === next.id) {
        const hh = Math.floor(diff / 60);
        const mm = diff % 60;
        cls = diff <= 30 ? 'urgent' : 'next';
        meta += ' · dans ' + (hh ? hh + 'h ' : '') + mm + 'min';
      }

      return `<div class="reminder ${cls}">
        <div class="r-time">${r.time}</div>
        <div class="r-body">
          <div class="r-text">${r.text}</div>
          <div class="r-meta">${meta}</div>
        </div>
        <button class="r-delete" onclick="deleteReminder(${r.id})">✕</button>
      </div>`;
    }).join('');
  }

  function addReminder() {
    const text = document.getElementById('r-text').value.trim();
    const time = document.getElementById('r-time').value;
    const repeat = document.getElementById('r-repeat').value;
    if (!text || !time) { alert('Veuillez entrer un horaire et une description.'); return; }
    reminders.push({ id: Date.now(), time, text, repeat });
    save();
    document.getElementById('r-text').value = '';
    document.getElementById('r-time').value = '';
    render();
  }

  function deleteReminder(id) {
    reminders = reminders.filter(r => r.id !== id);
    save();
    render();
  }

  load();
  render();
  setInterval(render, 15000);
</script>
</body>
</html>
